name: Release Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: c84916099b3200659b57a752a44f8e5972f948d8
          path: .deps/aoa-agents

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: 991097f9e0d1c5dc8bcf4bb9864d29f7c515e2b4
          path: .deps/aoa-evals

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: e2bba10f9f3136d9888d3c928d28db85798d7b62
          path: .deps/aoa-skills

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: 06eb973bd5ee5d5bac1c3613d932d1e8940d8b0a
          path: .deps/aoa-memo

      - name: Checkout 8Dionysus
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/8Dionysus
          ref: c0fd29bbf1250a5ac2a9d0bfd4f59cad46a9a490
          path: .deps/8Dionysus

      - name: Checkout aoa-sdk
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-sdk
          ref: f80efd52db3d3fa735a228276f968c420737de53
          path: .deps/aoa-sdk

      - name: Checkout aoa-stats
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-stats
          ref: c3cd213d5bb983961eaca1fa873eb4dc70b8bb20
          path: .deps/aoa-stats

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        env:
          AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
          AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
          AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
          AOA_MEMO_ROOT: ${{ github.workspace }}/.deps/aoa-memo
          AOA_8DIONYSUS_ROOT: ${{ github.workspace }}/.deps/8Dionysus
          AOA_SDK_ROOT: ${{ github.workspace }}/.deps/aoa-sdk
          AOA_STATS_ROOT: ${{ github.workspace }}/.deps/aoa-stats
        run: python scripts/release_check.py
