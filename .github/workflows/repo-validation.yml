name: Release Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: bf974accbf426a0574c3e63e2c13fef76057e190
          path: .deps/aoa-agents

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          ref: bf868625bcce22292d128874889d9666ff3a9df8
          path: .deps/aoa-evals

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: f71955c5e970728e6a1d1fc3bebcd7a9fe6b5690
          path: .deps/aoa-skills

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: cd678fa2aea33132200d415cb88822c4dc577088
          path: .deps/aoa-memo

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        env:
          AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
          AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
          AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
          AOA_MEMO_ROOT: ${{ github.workspace }}/.deps/aoa-memo
        run: python scripts/release_check.py
