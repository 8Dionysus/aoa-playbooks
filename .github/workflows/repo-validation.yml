name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          path: .deps/aoa-agents

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          path: .deps/aoa-evals

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          path: .deps/aoa-skills

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          path: .deps/aoa-memo

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install PyYAML

      - name: Run unit tests
        env:
          AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
        run: python -m unittest discover -s tests

      - name: Check derived activation surfaces
        env:
          AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
          AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
        run: python scripts/generate_playbook_activation_surfaces.py --check

      - name: Check derived federation surfaces
        run: python scripts/generate_playbook_federation_surfaces.py --check

      - name: Check derived composition surfaces
        env:
          AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
        run: python scripts/generate_playbook_composition_surfaces.py --check

      - name: Run playbook validator
        env:
          AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
          AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
          AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
          AOA_MEMO_ROOT: ${{ github.workspace }}/.deps/aoa-memo
        run: python scripts/validate_playbooks.py
